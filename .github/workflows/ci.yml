name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend (Build + Test + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: TypeScript check
        run: |
          cd app
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd app
          npx vitest run

      - name: Build
        run: |
          cd app
          npm run build

  sidecar:
    name: Sidecar (Python Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi "uvicorn[standard]" httpx pytest pytest-asyncio pydantic anyio

      - name: Run sidecar tests
        run: |
          cd app/sidecar
          python -m pytest tests/ -v --tb=short

  rust:
    name: Rust (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Clippy
        run: |
          cd app/src-tauri
          cargo clippy -- -D warnings

  python-automation:
    name: Python Automation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run automation tests
        run: |
          python -m pytest tests/ -v --tb=short
